name: Lint

# Static quality gate: coding standards, static analysis and EditorConfig conformance.
# Runs natively (no Docker) via shivammathur/setup-php for speed. PHPCS and PHPStan
# findings are surfaced as inline PR annotations (cs2pr / GitHub error format).

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/workflows/commitlint.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/test.yml'
      - '.husky/**'
      - 'commitlint.config.cjs'
      - 'package.json'
      - 'scripts/docker/**'
      - 'scripts/setup'
      - 'scripts/lib/runtime'

  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'
      - '.gitattributes'
      - 'LICENSE'
      - '.github/dependabot.yml'
      - '.github/workflows/commitlint.yml'
      - '.github/workflows/release.yml'
      - '.github/workflows/test.yml'
      - '.husky/**'
      - 'commitlint.config.cjs'
      - 'package.json'
      - 'scripts/docker/**'
      - 'scripts/setup'
      - 'scripts/lib/runtime'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  coding-standards:
    name: PHPCS & PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: cs2pr

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3

      - name: PHP_CodeSniffer
        # checkstyle output piped through cs2pr becomes inline annotations. Calling the
        # binary directly keeps stdout pure checkstyle XML; pipefail (GitHub's default
        # bash flags) makes a phpcs failure fail the step despite the pipe.
        run: vendor/bin/phpcs -q --report=checkstyle | cs2pr

      - name: PHPStan
        # PHPStan emits GitHub-native error annotations directly.
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1024M --error-format=github

  editorconfig:
    name: EditorConfig
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup editorconfig-checker
        uses: editorconfig-checker/action-editorconfig-checker@v2

      - name: Check EditorConfig conformance
        # Keeps the meaningful checks — indent_style (tabs vs spaces), trailing
        # whitespace, final newline, charset and LF endings — while disabling the two
        # that clash with legitimate content the generic checker can't reason about:
        #   -disable-max-line-length: owned by PHPCS, which understands PHP context.
        #   -disable-indent-size:     "leading spaces must be a multiple of N" fires on
        #                             markdown list continuations, shell heredoc bodies
        #                             and embedded awk; PHPCS already enforces exact PHP
        #                             indentation.
        # There is no local config file: all toggles are passed here on purpose.
        run: editorconfig-checker -disable-max-line-length -disable-indent-size
